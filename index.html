<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Blah Empowerment</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f4f0; color: #1a1a1a; min-height: 100vh; }
  .wrap { max-width: 900px; margin: 0 auto; padding: 24px 16px; }
  .header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
  .header h1 { font-size: 22px; font-weight: 600; }
  .header small { font-size: 11px; color: #888; display: block; margin-bottom: 2px; }
  .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .ts { font-size: 11px; color: #888; }
  .btn { padding: 6px 14px; border-radius: 8px; border: 1.5px solid #ddd; background: #fff; color: #1a1a1a; font-size: 12px; cursor: pointer; transition: all 0.15s; }
  .btn:hover { border-color: #999; }
  .btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .pill { padding: 5px 12px; border-radius: 20px; border: 1.5px solid #ddd; background: #fff; color: #1a1a1a; font-size: 12px; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; transition: all 0.15s; }
  .pill.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .section-label { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; margin-top: 20px; }
  .clients-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .toggle-bar { display: inline-flex; background: #ebebeb; border-radius: 10px; padding: 3px; margin-bottom: 10px; }
  .toggle-btn { padding: 5px 16px; border-radius: 7px; border: none; cursor: pointer; font-size: 12px; font-weight: 500; background: transparent; color: #888; transition: all 0.15s; }
  .toggle-btn.active { background: #fff; color: #1a1a1a; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  .periods-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 18px; }
  .kpis { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .kpi { background: #fff; border-radius: 10px; padding: 12px 14px; flex: 1; min-width: 100px; }
  .kpi-label { font-size: 11px; color: #888; margin-bottom: 4px; }
  .kpi-value { font-size: 18px; font-weight: 600; }
  .kpi-meta { font-size: 11px; margin-top: 3px; }
  .card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
  .funnel-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .funnel-label { width: 140px; font-size: 11px; color: #888; text-align: right; flex-shrink: 0; }
  .funnel-track { flex: 1; background: #f0f0f0; border-radius: 6px; height: 30px; overflow: hidden; }
  .funnel-bar { height: 100%; border-radius: 6px; display: flex; align-items: center; padding-left: 10px; transition: width 0.5s; }
  .funnel-bar span { font-size: 12px; font-weight: 600; color: #fff; white-space: nowrap; }
  .conv-label { font-size: 10px; color: #aaa; text-align: center; margin-bottom: 2px; }
  .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }
  .chart-card { background: #fff; border-radius: 12px; padding: 14px 16px; }
  .chart-title { font-size: 11px; font-weight: 500; color: #888; margin-bottom: 8px; }
  .chart-wrap { position: relative; height: 90px; }
  .estado-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .estado-chip { border-radius: 8px; padding: 6px 12px; text-align: center; cursor: pointer; border: 1.5px solid; }
  .estado-chip .mes { font-size: 10px; color: #888; }
  .estado-chip .est { font-size: 11px; font-weight: 600; }
  .loading { text-align: center; padding: 60px 0; color: #888; font-size: 13px; }
  .status-badge { display: flex; align-items: center; gap: 6px; }
  @media (max-width: 500px) { .charts-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div>
      <small>Blah Empowerment · Dashboard en vivo</small>
      <h1>Control Estratégico</h1>
    </div>
    <div class="header-right">
      <span class="ts" id="last-updated"></span>
      <button class="btn" id="btn-refresh" onclick="loadAll()">🔄 Actualizar</button>
      <div class="status-badge" id="status-badge" style="display:none">
        <div class="dot" id="status-dot"></div>
        <span style="font-size:12px;font-weight:600" id="status-text"></span>
      </div>
    </div>
  </div>
  <div class="clients-row" id="clients-row"></div>
  <div id="main-content"><div class="loading">⏳ Cargando datos desde Google Sheets...</div></div>
</div>

<script>
const APPS_SCRIPT = "https://script.google.com/macros/s/AKfycbwVp36M6wzwkWN1jfLn3MdMOhwOFWNCaTa1oWGHK2N8W-8zUztdFH9lB1s7ghscCAig/exec";

const SHEET_NAMES = {
  "Dra. Andrea":"Dra. Andrea","Dr. Amurrio":"Dr. Amurrio","Opticentro":"Opticentro",
  "Bajaj":"Bajaj","Dr. Abner":"Dr. Abner","Dr. Grover":"Dr. Grover ",
  "Dr. Candia":"Dr. Candia ","RUSO":"RUSO ","Beauty Corp":"Beauty Corp ",
  "Sueña":"Multiespumas","SiiPi":"Sii-Pi"
};

const CLIENT_CONFIG = {
  "Dra. Andrea": {currency:"$"},  "Dr. Amurrio": {currency:"Bs"},
  "Opticentro":  {currency:"$"},  "Bajaj":       {currency:"Bs"},
  "Dr. Abner":   {currency:"Bs"}, "Dr. Grover":  {currency:"$"},
  "Dr. Candia":  {currency:"$"},  "RUSO":        {currency:"Bs"},
  "Beauty Corp": {currency:"Bs"}, "Sueña":       {currency:"Bs"},
  "SiiPi":       {currency:"Bs"},
};

// All possible columns we want to extract — key: search terms in header
const COLUMN_MAP = [
  { key:"mes",          terms:["mes"],                          type:"label"  },
  { key:"presupuesto",  terms:["presupuesto"],                  type:"full"   },
  { key:"invertido",    terms:["invertido"],                    type:"full"   },
  { key:"leads",        terms:["leads","registros","conversaciones"], type:"int" },
  { key:"metaLeads",    terms:["meta leads","meta reg","meta conversaciones"], type:"int" },
  { key:"cpl",          terms:["cpl"],                          type:"ratio"  },
  { key:"metaCPL",      terms:["meta cpl"],                     type:"ratio"  },
  { key:"seguidores",   terms:["seguidores"],                   type:"int"    },
  { key:"metaSeg",      terms:["meta seguidores"],              type:"int"    },
  { key:"cps",          terms:["cps"],                          type:"ratio"  },
  { key:"metaCPS",      terms:["meta cps"],                     type:"ratio"  },
  { key:"agendamientos",terms:["agendamiento","citas asistidas","consultas"], type:"int" },
  { key:"metaAgend",    terms:["meta agend","meta consulta"],   type:"int"    },
  { key:"tasaLA",       terms:["tasa l→a","tasa l→c"],          type:"pct"    },
  { key:"cierres",      terms:["cierres","ventas concretadas"], type:"int"    },
  { key:"metaCierres",  terms:["meta cierres","meta ventas"],   type:"int"    },
  { key:"tasaAC",       terms:["tasa a→c"],                     type:"pct"    },
  { key:"ticketPromedio",terms:["ticket promedio"],             type:"full"   },
  { key:"facturacion",  terms:["facturación","facturacion","facturación bruta","facturacion bruta"], type:"full" },
  { key:"metaFact",     terms:["meta facturación","meta facturacion"], type:"full" },
  { key:"roas",         terms:["roas"],                         type:"ratio"  },
  { key:"metaROAS",     terms:["roas meta","meta roas"],        type:"ratio"  },
  { key:"roi",          terms:["roi"],                          type:"ratio"  },
  { key:"estado",       terms:["estado"],                       type:"label"  },
];

const QUARTER = {ene:"Q1",feb:"Q1",mar:"Q1",abr:"Q2",may:"Q2",jun:"Q2",jul:"Q3",ago:"Q3",sep:"Q3",oct:"Q4",nov:"Q4",dic:"Q4"};
const MESES   = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
const ESTADO_COLOR = {Verde:"#22c55e",Amarillo:"#f59e0b",Rojo:"#ef4444"};
const ESTADO_BG    = {Verde:"#f0fdf4",Amarillo:"#fffbeb",Rojo:"#fef2f2"};
const FUNNEL_COLORS = ["#6366f1","#f59e0b","#22c55e","#8b5cf6","#ec4899","#f97316"];

let allData = {}, selected = "Dr. Abner", periodMode = "mes", selPeriod = "may", charts = {};

const cleanVal = v => {
  if (!v||v.trim()===""||v==="#DIV/0!"||v==="​") return null;
  return v.replace(/[Bs$,%\s]/g,"").replace(/,/g,"");
};
const toNum = v => { const n=parseFloat(cleanVal(v)); return isNaN(n)?null:n; };
const toPct = v => { const n=parseFloat(cleanVal(v)); return isNaN(n)?null:+(n*100).toFixed(2); };

const fmtFull = (v,cur) => {
  if (v===null||v===undefined||isNaN(v)) return "—";
  return `${cur}${v.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}`;
};
const fmtRatio = (v,suffix="") => {
  if (v===null||v===undefined||isNaN(v)) return "—";
  return `${parseFloat(v.toFixed(2)).toLocaleString()}${suffix}`;
};
const fmtInt = v => {
  if (v===null||v===undefined||isNaN(v)) return "—";
  return Math.round(v).toLocaleString();
};
const fmtPct = v => {
  if (v===null||v===undefined||isNaN(v)) return "—";
  return `${parseFloat(v.toFixed(1))}%`;
};

const parseCSV = txt => {
  const rows=[]; const lines=txt.split(/\r?\n/);
  for (const line of lines) {
    if (!line.trim()) continue;
    const row=[]; let cur=""; let inQ=false;
    for (let i=0;i<line.length;i++) {
      const c=line[i];
      if(c==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
      else if(c===','&&!inQ){row.push(cur.trim());cur="";}
      else cur+=c;
    }
    row.push(cur.trim()); rows.push(row);
  }
  return rows;
};

const parseSheet = txt => {
  const rows = parseCSV(txt);
  // Find LAST header row (some sheets have multiple tables)
  let hi = -1;
  for (let i=rows.length-1;i>=0;i--) {
    if (rows[i].some(c=>c.toLowerCase().trim()==="mes")) { hi=i; break; }
  }
  if (hi===-1) return [];

  const headers = rows[hi].map(h=>h.toLowerCase().trim());

  // Map each column definition to its index
  const colIdx = {};
  COLUMN_MAP.forEach(col => {
    const idx = headers.findIndex(h => col.terms.some(t => h.includes(t)));
    if (idx !== -1) colIdx[col.key] = idx;
  });

  const data = [];
  for (let i=hi+1;i<rows.length;i++) {
    const r = rows[i];
    const mes = r[colIdx.mes]?.trim().toLowerCase().slice(0,3);
    if (!mes||!MESES.includes(mes)) continue;

    const row = { mes, q: QUARTER[mes]||"?" };
    COLUMN_MAP.forEach(col => {
      if (col.key==="mes"||colIdx[col.key]===undefined) return;
      const raw = r[colIdx[col.key]];
      if (col.type==="label")  row[col.key] = raw?.trim()||null;
      else if (col.type==="pct") row[col.key] = toPct(raw);
      else row[col.key] = toNum(raw);
    });

    // Skip rows with no real data
    const hasData = ["invertido","leads","seguidores","cierres","facturacion"]
      .some(k => row[k]!=null && row[k]>0);
    if (!hasData) continue;

    data.push(row);
  }
  return data;
};

const sumF=(rows,k)=>rows.reduce((a,r)=>a+(parseFloat(r[k])||0),0);
const avgF=(rows,k)=>{const v=rows.filter(r=>r[k]!=null&&r[k]>0);return v.length?sumF(v,k)/v.length:null;};

const aggRows = rows => {
  if (!rows.length) return {};
  if (rows.length===1) return {...rows[0]};
  const last = rows[rows.length-1];
  const inv  = sumF(rows,"invertido"), leads=sumF(rows,"leads"), fact=sumF(rows,"facturacion");
  return { ...last,
    presupuesto:   sumF(rows,"presupuesto"),
    invertido:     inv, leads, facturacion: fact,
    agendamientos: sumF(rows,"agendamientos"),
    cierres:       sumF(rows,"cierres"),
    seguidores:    sumF(rows,"seguidores"),
    cpl:           inv>0&&leads>0 ? +(inv/leads).toFixed(4) : avgF(rows,"cpl"),
    roas:          inv>0&&fact>0  ? +(fact/inv).toFixed(4)  : avgF(rows,"roas"),
    ticketPromedio: avgF(rows,"ticketPromedio"),
    tasaLA:         avgF(rows,"tasaLA"),
    tasaAC:         avgF(rows,"tasaAC"),
  };
};

const fetchViaJsonp = name => new Promise(resolve=>{
  const sheet=SHEET_NAMES[name];
  const cbName=`_cb_${Math.random().toString(36).slice(2)}`;
  const timeout=setTimeout(()=>{cleanup();resolve([]);},12000);
  const cleanup=()=>{delete window[cbName];document.getElementById(cbName)?.remove();clearTimeout(timeout);};
  window[cbName]=txt=>{cleanup();resolve(parseSheet(txt));};
  const s=document.createElement("script");
  s.id=cbName; s.onerror=()=>{cleanup();resolve([]);};
  s.src=`${APPS_SCRIPT}?sheet=${encodeURIComponent(sheet)}&callback=${cbName}`;
  document.head.appendChild(s);
});

async function loadAll() {
  document.getElementById("btn-refresh").textContent="⏳ cargando...";
  document.getElementById("btn-refresh").disabled=true;
  await Promise.all(Object.keys(SHEET_NAMES).map(async name=>{
    allData[name]=await fetchViaJsonp(name);
  }));
  document.getElementById("last-updated").textContent=`⏱ ${new Date().toLocaleTimeString()}`;
  document.getElementById("btn-refresh").textContent="🔄 Actualizar";
  document.getElementById("btn-refresh").disabled=false;
  renderClients();
  renderMain();
}

function renderClients() {
  const row=document.getElementById("clients-row");
  row.innerHTML="";
  Object.keys(CLIENT_CONFIG).forEach(name=>{
    const d=allData[name]||[];
    const est=d.length?d[d.length-1].estado:null;
    const color=ESTADO_COLOR[est]||"#ccc";
    const active=name===selected;
    const btn=document.createElement("button");
    btn.className="pill"+(active?" active":"");
    btn.innerHTML=`<span class="dot" style="background:${active?"#fff":color}"></span>${name}`;
    btn.onclick=()=>{
      selected=name; periodMode="mes";
      const cd=allData[name]||[];
      selPeriod=cd.length?cd[cd.length-1].mes:"may";
      renderClients(); renderMain();
    };
    row.appendChild(btn);
  });
}

function destroyCharts() { Object.values(charts).forEach(c=>c.destroy()); charts={}; }

function renderMain() {
  destroyCharts();
  const clientData=allData[selected]||[];
  const cfg=CLIENT_CONFIG[selected];
  const cur=cfg.currency;
  const mc=document.getElementById("main-content");

  if (!clientData.length) {
    mc.innerHTML=`<div class="loading">Sin datos para ${selected}. Hacé clic en 🔄 Actualizar.</div>`;
    return;
  }

  const periods=periodMode==="mes"
    ?[...new Set(clientData.map(d=>d.mes))]
    :[...new Set(clientData.map(d=>d.q))];
  if (!periods.includes(selPeriod)) selPeriod=periods[periods.length-1];

  const periodRows=periodMode==="mes"
    ?clientData.filter(d=>d.mes===selPeriod)
    :clientData.filter(d=>d.q===selPeriod);
  const agg=aggRows(periodRows);
  const est=agg.estado||"—";

  const badge=document.getElementById("status-badge");
  badge.style.display="flex";
  document.getElementById("status-dot").style.background=ESTADO_COLOR[est]||"#ccc";
  document.getElementById("status-text").style.color=ESTADO_COLOR[est]||"#888";
  document.getElementById("status-text").textContent=est;

  let html=``;

  // Toggle
  html+=`<div class="toggle-bar">
    <button class="toggle-btn${periodMode==="mes"?" active":""}" onclick="switchMode('mes')">Por mes</button>
    <button class="toggle-btn${periodMode==="q"?" active":""}" onclick="switchMode('q')">Por trimestre</button>
  </div>`;

  // Period buttons
  html+=`<div class="periods-row">${periods.map(p=>`
    <button class="btn${selPeriod===p?" active":""}" onclick="switchPeriod('${p}')">${p.toUpperCase()}</button>`).join("")}</div>`;

  // KPIs — todos los que tengan valor
  const kpiDefs = [
    { label:"Presupuesto",    val:agg.presupuesto,    fmt:()=>fmtFull(agg.presupuesto,cur) },
    { label:"Invertido",      val:agg.invertido,      fmt:()=>fmtFull(agg.invertido,cur) },
    { label:"Leads / Reg.",   val:agg.leads,          fmt:()=>fmtInt(agg.leads),           meta:agg.metaLeads, good:"high" },
    { label:"Seguidores",     val:agg.seguidores,     fmt:()=>fmtInt(agg.seguidores),      meta:agg.metaSeg,   good:"high" },
    { label:"CPL",            val:agg.cpl,            fmt:()=>`${cur}${fmtRatio(agg.cpl)}`,meta:agg.metaCPL,  good:"low",  metaFmt:()=>`${cur}${fmtRatio(agg.metaCPL)}` },
    { label:"CPS",            val:agg.cps,            fmt:()=>`${cur}${fmtRatio(agg.cps)}`,meta:agg.metaCPS,  good:"low",  metaFmt:()=>`${cur}${fmtRatio(agg.metaCPS)}` },
    { label:"Agendamientos",  val:agg.agendamientos,  fmt:()=>fmtInt(agg.agendamientos),   meta:agg.metaAgend, good:"high" },
    { label:"Tasa L→A",       val:agg.tasaLA,         fmt:()=>fmtPct(agg.tasaLA) },
    { label:"Cierres / Ventas",val:agg.cierres,       fmt:()=>fmtInt(agg.cierres),         meta:agg.metaCierres,good:"high" },
    { label:"Tasa A→C",       val:agg.tasaAC,         fmt:()=>fmtPct(agg.tasaAC) },
    { label:"Ticket Promedio", val:agg.ticketPromedio,fmt:()=>fmtFull(agg.ticketPromedio,cur) },
    { label:"Facturación",    val:agg.facturacion,    fmt:()=>fmtFull(agg.facturacion,cur),meta:agg.metaFact, good:"high", metaFmt:()=>fmtFull(agg.metaFact,cur) },
    { label:"ROAS",           val:agg.roas,           fmt:()=>`${fmtRatio(agg.roas)}x`,    meta:agg.metaROAS,  good:"high", metaFmt:()=>`${fmtRatio(agg.metaROAS)}x` },
    { label:"ROI",            val:agg.roi,            fmt:()=>`${fmtRatio(agg.roi)}x` },
  ].filter(k => k.val!=null && k.val>0);

  html+=`<div class="section-label">Resumen — ${selPeriod.toUpperCase()}${periodMode==="q"?" (Trimestre)":""}</div><div class="kpis">`;
  kpiDefs.forEach(k=>{
    const nV=parseFloat(k.val), nM=k.meta!=null?parseFloat(k.meta):NaN;
    const ok=!isNaN(nV)&&!isNaN(nM)?(k.good==="low"?nV<=nM:nV>=nM):null;
    const metaStr=k.metaFmt?k.metaFmt():nM?nM.toLocaleString():null;
    const metaHtml=k.meta!=null&&metaStr?`<div class="kpi-meta" style="color:${ok?"#22c55e":"#ef4444"}">meta: ${metaStr} ${ok?"✓":"✗"}</div>`:"";
    html+=`<div class="kpi"><div class="kpi-label">${k.label}</div><div class="kpi-value">${k.fmt()}</div>${metaHtml}</div>`;
  });
  html+=`</div>`;

  // Funnel — todos los indicadores de volumen disponibles
  const FUNNEL_DEFS = [
    {key:"leads",        label:"Leads / Registros",  icon:"👥"},
    {key:"seguidores",   label:"Seguidores",          icon:"📣"},
    {key:"agendamientos",label:"Agendamientos",       icon:"📅"},
    {key:"cierres",      label:"Cierres / Ventas",    icon:"🛍️"},
  ];
  const fItems=FUNNEL_DEFS.map(f=>({...f,value:agg[f.key]??0})).filter(i=>i.value>0);
  const fMax=Math.max(...fItems.map(i=>i.value),1);

  html+=`<div class="card"><div class="section-label" style="margin-top:0">Embudo — ${selPeriod.toUpperCase()}</div>`;
  if (!fItems.length) {
    html+=`<div style="color:#aaa;font-size:12px">Sin datos de embudo para este período.</div>`;
  } else {
    fItems.forEach((item,i)=>{
      const pct=Math.max((item.value/fMax)*100,6);
      const conv=i>0&&fItems[i-1].value>0?((item.value/fItems[i-1].value)*100).toFixed(1):null;
      if(conv) html+=`<div class="conv-label">↓ ${conv}% conversión</div>`;
      html+=`<div class="funnel-row">
        <div class="funnel-label">${item.icon} ${item.label}</div>
        <div class="funnel-track">
          <div class="funnel-bar" style="width:${pct}%;background:${FUNNEL_COLORS[i%FUNNEL_COLORS.length]}">
            <span>${Math.round(item.value).toLocaleString()}</span>
          </div>
        </div>
      </div>`;
    });

    // Métricas adicionales debajo del embudo
    const extras=[
      agg.tasaLA!=null&&agg.tasaLA>0   ? `Tasa L→A: <b>${fmtPct(agg.tasaLA)}</b>` : null,
      agg.tasaAC!=null&&agg.tasaAC>0   ? `Tasa A→C: <b>${fmtPct(agg.tasaAC)}</b>` : null,
      agg.ticketPromedio!=null&&agg.ticketPromedio>0 ? `Ticket promedio: <b>${fmtFull(agg.ticketPromedio,cur)}</b>` : null,
      agg.facturacion!=null&&agg.facturacion>0 ? `Facturación: <b>${fmtFull(agg.facturacion,cur)}</b>` : null,
      agg.roas!=null&&agg.roas>0       ? `ROAS: <b>${fmtRatio(agg.roas)}x</b>` : null,
    ].filter(Boolean);
    if (extras.length) {
      html+=`<div style="display:flex;flex-wrap:wrap;gap:12px;margin-top:14px;padding-top:12px;border-top:1px solid #f0f0f0">
        ${extras.map(e=>`<span style="font-size:12px;color:#888">${e}</span>`).join("")}
      </div>`;
    }
  }
  html+=`</div>`;

  // Charts — todos los campos numéricos con al menos 2 meses de data
  const CHART_DEFS=[
    {key:"leads",        label:"Leads / Registros", color:"#6366f1", metaKey:null},
    {key:"seguidores",   label:"Seguidores",         color:"#06b6d4", metaKey:"metaSeg"},
    {key:"cpl",          label:"CPL",                color:"#f59e0b", metaKey:"metaCPL"},
    {key:"cps",          label:"CPS",                color:"#f97316", metaKey:"metaCPS"},
    {key:"agendamientos",label:"Agendamientos",      color:"#8b5cf6", metaKey:"metaAgend"},
    {key:"cierres",      label:"Cierres / Ventas",   color:"#22c55e", metaKey:"metaCierres"},
    {key:"facturacion",  label:"Facturación",         color:"#6366f1", metaKey:"metaFact"},
    {key:"ticketPromedio",label:"Ticket Promedio",   color:"#ec4899", metaKey:null},
    {key:"roas",         label:"ROAS",               color:"#ec4899", metaKey:"metaROAS"},
    {key:"roi",          label:"ROI",                color:"#14b8a6", metaKey:null},
  ].filter(c=>clientData.filter(d=>d[c.key]!=null&&d[c.key]>0).length>=2);

  if (CHART_DEFS.length) {
    html+=`<div class="section-label">Tendencias</div><div class="charts-grid">`;
    CHART_DEFS.forEach(c=>{
      html+=`<div class="chart-card"><div class="chart-title">${c.label}</div><div class="chart-wrap"><canvas id="chart-${c.key}"></canvas></div></div>`;
    });
    html+=`</div>`;
  }

  // Estado histórico
  html+=`<div class="section-label">Historial de estado</div><div class="estado-row">`;
  clientData.forEach(d=>{
    const ec=ESTADO_COLOR[d.estado]||"#ccc", eb=ESTADO_BG[d.estado]||"#f9f9f9";
    html+=`<div class="estado-chip" style="background:${eb};border-color:${ec}" onclick="switchPeriodMes('${d.mes}')">
      <div class="mes">${d.mes}</div>
      <div class="est" style="color:${ec}">${d.estado||"—"}</div>
    </div>`;
  });
  html+=`</div>`;

  mc.innerHTML=html;

  // Render charts
  CHART_DEFS.forEach(c=>{
    const canvas=document.getElementById(`chart-${c.key}`);
    if (!canvas) return;
    const valid=clientData.filter(d=>d[c.key]!=null&&d[c.key]>0);
    const meta=valid[0]?.[c.metaKey];
    const datasets=[{
      data:valid.map(d=>d[c.key]),
      borderColor:c.color,borderWidth:2,pointRadius:3,pointBackgroundColor:c.color,
      tension:0.3,fill:false
    }];
    if (meta!=null) datasets.push({
      data:valid.map(()=>meta),
      borderColor:"#ddd",borderWidth:1,borderDash:[4,4],pointRadius:0,fill:false
    });
    charts[c.key]=new Chart(canvas,{
      type:"line",
      data:{labels:valid.map(d=>d.mes),datasets},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.parsed.y}`}}},
        scales:{x:{grid:{display:false},ticks:{font:{size:10}}},y:{display:false}}}
    });
  });
}

function switchMode(mode) {
  periodMode=mode;
  const cd=allData[selected]||[];
  const periods=[...new Set(cd.map(d=>d[mode==="mes"?"mes":"q"]))];
  selPeriod=periods[periods.length-1]||"";
  renderMain();
}
function switchPeriod(p) { selPeriod=p; renderMain(); }
function switchPeriodMes(p) { periodMode="mes"; selPeriod=p; renderMain(); }

loadAll();
</script>
</body>
</html>
